name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (Maven, JDK 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        run: mvn -B -ntp verify

  channel:
    name: Channel (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: channel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: channel/package-lock.json
      - run: npm ci
      - name: Build (tsc)
        run: npm run build
